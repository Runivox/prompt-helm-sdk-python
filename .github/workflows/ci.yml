name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Format check
        run: ruff format --check src tests
      - name: Type check
        run: mypy --strict src
      - name: Tests
        run: pytest -v

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Resolve the SDK dependency closure
        run: |
          python -m pip install --upgrade pip
          # Install ONLY the SDK so the freeze captures its runtime dependency
          # closure (httpx + transitives) and nothing else. We exclude the
          # local, not-yet-published project itself (pip-audit cannot look it
          # up on PyPI) — matched whether pip renders it as `name==x` or
          # `name @ file://...`.
          pip install .
          pip freeze --exclude-editable \
            | grep -viE '^(prompt[-_]helm)( *==| *@)' \
            > audit-requirements.txt
          cat audit-requirements.txt
      - name: Install audit tool
        run: pip install pip-audit
      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --strict --progress-spinner off -r audit-requirements.txt

  publish:
    name: Publish to PyPI
    needs: [test, audit]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build distributions
        run: python -m build
      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
